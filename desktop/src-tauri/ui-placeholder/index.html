<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSAnime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0d0d0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      user-select: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a30;
      border-top-color: #7c6af7;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: #a0a0b0;
      letter-spacing: 0.02em;
    }
    p {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #505060;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Starting SSAnime</h1>
    <p>Waiting for daemon&hellip;</p>
  </div>
</body>
</html>
