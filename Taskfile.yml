version: "3"

vars:
  PKG: github.com/modbender/ssanime-gui
  CMD: ./cmd/ssanime
  OUT_WIN: ssanime.exe
  OUT_LIN: ssanime-linux-amd64
  OUT_MAC: ssanime-darwin-amd64
  # -s strips the symbol table; -w omits DWARF debug info.
  # -H=windowsgui hides the console window on Windows.
  LDFLAGS_WIN: "-H=windowsgui -s -w"
  LDFLAGS_UNIX: "-s -w"

tasks:
  default:
    desc: Build the Windows GUI binary (no console window)
    cmds:
      - task: build-windows

  build-windows:
    desc: "Build Windows GUI binary → ssanime.exe (no console, stripped)"
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags "{{.LDFLAGS_WIN}}" -o {{.OUT_WIN}} {{.CMD}}
    env:
      GOOS: windows
      GOARCH: amd64

  build-windows-console:
    desc: "Build Windows console binary → ssanime.exe (console attached, for debugging)"
    cmds:
      - go build -ldflags "-s -w" -o {{.OUT_WIN}} {{.CMD}}

  build-linux:
    desc: "Build Linux amd64 binary → ssanime-linux-amd64"
    cmds:
      - go build -ldflags "{{.LDFLAGS_UNIX}}" -o {{.OUT_LIN}} {{.CMD}}
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: "0"

  build-darwin:
    desc: "Build macOS amd64 binary → ssanime-darwin-amd64 (must run on a Mac; CGO required for systray AppKit)"
    cmds:
      - go build -ldflags "{{.LDFLAGS_UNIX}}" -o {{.OUT_MAC}} {{.CMD}}
    env:
      GOOS: darwin
      GOARCH: amd64
      # CGO_ENABLED=1 required: fyne.io/systray uses AppKit on macOS (Objective-C bridge).
      # Cross-compiling from Windows/Linux is not supported without a cross-CGO toolchain.

  build-all:
    desc: Build for all platforms
    deps: [build-windows, build-linux, build-darwin]

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  clean:
    desc: Remove built binaries
    cmds:
      - rm -f {{.OUT_WIN}} {{.OUT_LIN}} {{.OUT_MAC}}

  frontend:
    desc: Build the Svelte frontend (produces frontend/dist/, embedded via go:embed)
    dir: frontend
    cmds:
      - bun install
      - bun run build

  build-sidecar:
    desc: "Build the Go sidecar (no console window) into desktop/src-tauri/binaries/ (for Tauri bundling)"
    cmds:
      # -H=windowsgui: the sidecar is embedded by the Tauri shell — no console window should pop up.
      - go build -ldflags "-H=windowsgui -s -w" -o desktop/src-tauri/binaries/ssanime-x86_64-pc-windows-msvc.exe ./cmd/ssanime
    env:
      GOOS: windows
      GOARCH: amd64

  build-desktop:
    desc: "Build the Tauri desktop app: Go sidecar → tauri build → NSIS installer under desktop/src-tauri/target/release/bundle/"
    deps: [build-sidecar]
    dir: desktop
    cmds:
      - bunx @tauri-apps/cli@latest build
