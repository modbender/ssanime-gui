name: Release (manual fallback)

# Emergency / manual installer build. The PRIMARY release path is automatic:
# release-please.yml opens a Release PR; merging it cuts the tag + GitHub Release
# and builds/attaches the installers. This workflow exists only for the case where
# a maintainer needs to (re)build and (re)attach the Windows installers to an
# EXISTING release by hand — e.g. a transient build failure on the automatic run.
#
# It does NOT trigger on tag push anymore (that would double-fire alongside
# release-please's own tag). It runs only on manual dispatch against a tag whose
# GitHub Release already exists, and uploads the installers to that release with
# `gh release upload --clobber` (idempotent). It never creates a release.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build and attach installers to (e.g. v0.2.0). Its GitHub Release must already exist."
        required: true
        type: string

# Cancel a superseded manual run for the same tag input.
concurrency:
  group: release-manual-${{ github.event.inputs.tag }}
  cancel-in-progress: true

# `gh release upload` needs write access to repo contents.
permissions:
  contents: write

jobs:
  release:
    name: release (windows)
    # Windows only for v1: NSIS + MSI are Windows bundles, and the systray code
    # needs CGO + a Mac runner on macOS (out of scope). A single Windows job is correct.
    runs-on: windows-latest
    steps:
      # Check out the tag being released so the build matches that release's source.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Tauri's bundler is built in Rust, so the host toolchain must be present.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build of the Tauri bundler crate between releases.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # --- Build order is load-bearing (see docs/distribution.md) -------------
      # The Go daemon `go:embed`s internal/server/dist, so the SPA must be built
      # and emitted there BEFORE the sidecar is compiled, and the sidecar must
      # exist BEFORE Tauri bundles it.

      # 1. Build the SPA → frontend's build emits to internal/server/dist for go:embed.
      - name: build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      # 2. Build the Go sidecar with the SPA now embedded. The output filename is the
      #    Tauri sidecar target-triple name; -H=windowsgui suppresses the console window.
      - name: build sidecar
        env:
          CGO_ENABLED: "0"
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-H=windowsgui -s -w" -o desktop/src-tauri/binaries/ssanime-x86_64-pc-windows-msvc.exe ./cmd/ssanime

      # 3. Build the Tauri app (NSIS + MSI) in BUILD-ONLY mode (tagName/releaseName/
      #    releaseId omitted) so tauri-action does not create a second release. We
      #    upload to the existing release ourselves below. Pinned to @v0 per the
      #    official Tauri v2 docs (https://v2.tauri.app/distribute/pipelines/github/).
      - name: build tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          # --- Code signing (currently UNSIGNED) --------------------------------
          # The app ships unsigned for now; SmartScreen will warn "unknown
          # publisher". To sign later, set bundle.windows.certificateThumbprint in
          # tauri.conf.json (or a custom signCommand) and inject the cert here —
          # no workflow rewrite needed. See docs/distribution.md for the full path.
          # Example secret wiring once a cert exists (keep commented until then):
          #   TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # tagName/releaseName/releaseId intentionally omitted → build-only.

      # 4. Attach the installers to the EXISTING release for the dispatched tag.
      #    --clobber overwrites any prior assets so a re-run is idempotent.
      - name: upload installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $assets = @(
            Get-ChildItem -Path desktop/src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction Stop
            Get-ChildItem -Path desktop/src-tauri/target/release/bundle/msi  -Filter *.msi -ErrorAction Stop
          ) | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "no installer artifacts found to upload" }
          gh release upload $tag $assets --clobber
