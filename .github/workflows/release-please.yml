name: Release Please

# Conventional-Commits-driven automated releases on `main`.
#
# Flow:
#   1. Every push to main runs `release-please`, which maintains a single open
#      "Release PR" staging the next version + CHANGELOG. Bumps follow standard
#      semver: feat! / BREAKING CHANGE -> major, feat -> minor, fix / perf ->
#      patch; chore/docs/refactor/ci/build/test produce no bump (changelog only).
#   2. Merging that Release PR makes release-please cut the `v<version>` tag and
#      publish the GitHub Release. ONLY THEN (release_created == true) does the
#      `build-installers` job run and attach the Windows NSIS/MSI to that release.
#
# Ordinary commits never build installers — exactly one installer build per
# release, gated on the Release PR merge. The manual fallback for emergency
# builds lives in release.yml (workflow_dispatch).
on:
  push:
    branches: [main]

# Serialise release activity on main; don't cancel an in-flight installer build.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      # v4 manifest outputs for the root (".") component. `release_created` is the
      # gate for the build job; `tag_name` is the `v<version>` tag to upload to.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Requires "Allow GitHub Actions to create and approve pull requests" under
      # Settings -> Actions -> General -> Workflow permissions, or the default
      # GITHUB_TOKEN cannot open the Release PR. See docs/distribution.md.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-installers:
    name: build-installers (windows)
    needs: release-please
    # Only build/attach installers when the Release PR merge actually cut a
    # release. On ordinary commits this is skipped entirely.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    permissions:
      # Uploading assets to the release via `gh release upload` needs write.
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Tauri's bundler is built in Rust, so the host toolchain must be present.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build of the Tauri bundler crate between releases.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # --- Build order is load-bearing (see docs/distribution.md) -------------
      # The Go daemon `go:embed`s internal/server/dist, so the SPA must be built
      # and emitted there BEFORE the sidecar is compiled, and the sidecar must
      # exist BEFORE Tauri bundles it.

      # 1. Build the SPA -> frontend's build emits to internal/server/dist for go:embed.
      - name: build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      # 2. Build the Go sidecar with the SPA now embedded. The output filename is the
      #    Tauri sidecar target-triple name; -H=windowsgui suppresses the console window.
      - name: build sidecar
        env:
          CGO_ENABLED: "0"
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-H=windowsgui -s -w" -o desktop/src-tauri/binaries/ssanime-x86_64-pc-windows-msvc.exe ./cmd/ssanime

      # 3. Build the Tauri app (NSIS + MSI) in BUILD-ONLY mode. tagName/releaseName/
      #    releaseId are omitted on purpose so tauri-action does NOT create or draft
      #    a release — release-please already published the GitHub Release for this
      #    tag, and a second release would conflict. We upload the artifacts ourselves
      #    in the next step. Pinned to @v0 per the official Tauri v2 docs
      #    (https://v2.tauri.app/distribute/pipelines/github/).
      - name: build tauri installers
        uses: tauri-apps/tauri-action@v0
        # Code signing (currently UNSIGNED): SmartScreen warns "unknown publisher".
        # To sign later, set bundle.windows.certificateThumbprint in tauri.conf.json
        # (or a custom signCommand) and add an `env:` block here wiring
        # TAURI_SIGNING_PRIVATE_KEY / _PASSWORD from secrets. See docs/distribution.md.
        with:
          projectPath: desktop
          # tagName/releaseName/releaseId intentionally omitted -> build-only.

      # 4. Attach the produced installers to the release release-please ALREADY
      #    created for this tag. --clobber makes re-runs idempotent.
      - name: upload installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $assets = @(
            Get-ChildItem -Path desktop/src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction Stop
            Get-ChildItem -Path desktop/src-tauri/target/release/bundle/msi  -Filter *.msi -ErrorAction Stop
          ) | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "no installer artifacts found to upload" }
          gh release upload $tag $assets --clobber
