name: Release Please

# Conventional-Commits-driven automated releases on `main`.
#
# Flow:
#   1. Every push to main runs `release-please`, which maintains a single open
#      "Release PR" staging the next version + CHANGELOG. Bumps follow standard
#      semver: feat! / BREAKING CHANGE -> major, feat -> minor, fix / perf ->
#      patch; chore/docs/refactor/ci/build/test produce no bump (changelog only).
#   2. Merging that Release PR makes release-please cut the `v<version>` tag and
#      publish the GitHub Release. ONLY THEN (release_created == true) does the
#      `build-installers` job run and attach the per-OS installers to that release.
#
# Ordinary commits never build installers — exactly one installer build per
# release, gated on the Release PR merge. The manual fallback for emergency
# builds lives in release.yml (workflow_dispatch).
on:
  push:
    branches: [main]

# Serialise release activity on main; don't cancel an in-flight installer build.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # The auto-pass step below creates `backend`/`frontend` check-runs on the
  # Release PR head SHA via the Checks API, which requires checks:write.
  checks: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      # v4 manifest outputs for the root (".") component. `release_created` is the
      # gate for the build job; `tag_name` is the `v<version>` tag to upload to.
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Requires "Allow GitHub Actions to create and approve pull requests" under
      # Settings -> Actions -> General -> Workflow permissions, or the default
      # GITHUB_TOKEN cannot open the Release PR. See docs/distribution.md.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Auto-pass the required CI checks on the open Release PR.
      #
      # The Release PR is authored by GITHUB_TOKEN, and GitHub deliberately blocks
      # token-authored events from triggering other workflows (here: ci.yml). So
      # the required `backend`/`frontend` check-runs never run on the Release PR and
      # it can't be merged without a manual close/reopen to re-trigger CI.
      #
      # The Release PR only bumps the version + CHANGELOG (no code), so we report
      # those checks as passed directly. We create CHECK-RUNS (not commit statuses):
      # the branch protection requires github-actions app check-runs named exactly
      # `backend`/`frontend`, and a plain commit *status* of the same name would NOT
      # satisfy an app-pinned required check. GITHUB_TOKEN creates check-runs AS the
      # github-actions app, which matches. Idempotent: re-running just re-creates
      # success check-runs for the current head SHA.
      - name: auto-pass CI on release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release-please labels its open Release PR `autorelease: pending` (its
          # default pending label). No PR with that label -> nothing to do, exit 0.
          pr_sha="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --label "autorelease: pending" --json headRefOid \
            --jq '.[0].headRefOid // empty')"
          if [ -z "$pr_sha" ]; then
            echo "No open release PR (autorelease: pending) — nothing to auto-pass."
            exit 0
          fi
          echo "Auto-passing backend/frontend check-runs for release PR head $pr_sha"
          for check in backend frontend; do
            gh api -X POST "repos/$GITHUB_REPOSITORY/check-runs" \
              -f name="$check" \
              -f head_sha="$pr_sha" \
              -f status=completed \
              -f conclusion=success \
              -f output[title]="Auto-passed for release PR" \
              -f output[summary]="Release PRs only bump the version + CHANGELOG (no code changes), so the $check check is reported as passed directly. CI cannot run on token-authored PRs."
          done

  build-installers:
    name: build-installers (${{ matrix.os }})
    needs: release-please
    # Only build/attach installers when the Release PR merge actually cut a
    # release. On ordinary commits this is skipped entirely.
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      # Uploading assets to the release via `gh release upload` needs write.
      contents: write
    strategy:
      # One OS failing must not abort the others — each leg uploads independently,
      # so a transient failure on (say) macOS still ships the Windows + Linux assets.
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          # - macos-latest  # disabled: needs an Apple Developer account ($99/yr)
          #   to sign + notarize; an unsigned .dmg is Gatekeeper-blocked for users.
          #   The mac leg also did not produce a usable .dmg in CI. Re-enable this
          #   line (and add Apple signing secrets) when a Developer account exists.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Tauri's bundler is built in Rust, so the host toolchain must be present.
      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build of the Tauri bundler crate between releases.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Linux-only: Tauri v2's webview/bundler needs GTK + WebKitGTK 4.1 +
      # appindicator dev headers. ubuntu-latest is 24.04, which ships
      # libwebkit2gtk-4.1 (NOT 4.0). rpm = rpmbuild for the .rpm bundle; patchelf
      # + file are required by the AppImage bundler. libxdo-dev + libssl-dev are in
      # the Tauri v2 Linux prereqs list. We deliberately do NOT install libfuse2:
      # on Ubuntu 24.04 it was renamed to libfuse2t64, so the old name 404s — instead
      # the tauri build step exports APPIMAGE_EXTRACT_AND_RUN=1, the FUSE-free way to
      # run appimagetool/linuxdeploy in CI. Verified against the Tauri v2 Linux
      # prerequisites (https://v2.tauri.app/start/prerequisites/) and the v2 GitHub
      # pipeline example (https://v2.tauri.app/distribute/pipelines/github/).
      - name: install linux tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            patchelf \
            rpm

      # --- Build order is load-bearing (see docs/distribution.md) -------------
      # The Go daemon `go:embed`s internal/server/dist, so the SPA must be built
      # and emitted there BEFORE the sidecar is compiled, and the sidecar must
      # exist BEFORE Tauri bundles it.

      # 1. Build the SPA -> frontend's build emits to internal/server/dist for
      #    go:embed. Identical on every OS.
      - name: build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      # 2a. Build the Go sidecar (Windows). The output filename is the Tauri
      #     sidecar target-triple name; -H=windowsgui suppresses the console window.
      #     Windows is cgo-free (modernc.org/sqlite + pure-Go systray).
      - name: build sidecar (windows)
        if: matrix.os == 'windows-latest'
        env:
          CGO_ENABLED: "0"
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "-H=windowsgui -s -w" -o desktop/src-tauri/binaries/ssanime-x86_64-pc-windows-msvc.exe ./cmd/ssanime

      # 2b. Build the Go sidecar (Linux). cgo-free like Windows (pure-Go systray).
      #     Tauri resolves externalBin to the unknown-linux-gnu triple suffix.
      - name: build sidecar (linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w" -o desktop/src-tauri/binaries/ssanime-x86_64-unknown-linux-gnu ./cmd/ssanime

      # 2c. Build the Go sidecar (macOS, Apple Silicon). macos-latest is arm64.
      #     CGO_ENABLED=1 because the macOS systray (fyne.io/systray) binds the
      #     AppKit Objective-C runtime via cgo; the macos runner has a C compiler.
      #     Windows/Linux stay cgo-free; only macOS needs cgo.
      - name: build sidecar (macos)
        if: matrix.os == 'macos-latest'
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: |
          go build -ldflags "-s -w" -o desktop/src-tauri/binaries/ssanime-aarch64-apple-darwin ./cmd/ssanime

      # 3. Build the Tauri app installers in BUILD-ONLY mode. tagName/releaseName/
      #    releaseId are omitted on purpose so tauri-action does NOT create or draft
      #    a release — release-please already published the GitHub Release for this
      #    tag, and a second release would conflict. We upload the artifacts ourselves
      #    in the next step. Pinned to @v0 per the official Tauri v2 docs
      #    (https://v2.tauri.app/distribute/pipelines/github/).
      #
      #    Code signing (currently UNSIGNED on all OSes): Windows SmartScreen warns
      #    "unknown publisher"; macOS Gatekeeper blocks the unsigned/un-notarized
      #    .dmg. To sign later, add the signing secrets as keys to the env: block
      #    below (Windows: TAURI_SIGNING_PRIVATE_KEY/_PASSWORD or a signCommand;
      #    macOS: APPLE_CERTIFICATE/_PASSWORD/_SIGNING_IDENTITY + the notarization
      #    APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID). The env: already carries a real key
      #    (APPIMAGE_EXTRACT_AND_RUN) — never reduce it to comments only (an empty
      #    env: is invalid and breaks the workflow). See docs/distribution.md.
      - name: build tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          # FUSE-free AppImage packaging: appimagetool/linuxdeploy honor this and
          # extract-and-run instead of mounting via FUSE, which isn't available on
          # GitHub runners (and avoids the libfuse2 -> libfuse2t64 rename on 24.04).
          # No-op on Windows/macOS. This is a REAL key, not a comment-only env block.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          projectPath: desktop
          # tagName/releaseName/releaseId intentionally omitted -> build-only.

      # 4. Attach this OS's bundles to the release release-please ALREADY created
      #    for this tag. Each OS uploads only its own artifacts with --clobber so
      #    re-runs are idempotent and the legs never collide. The upload globs
      #    whatever bundles exist for the OS (e.g. .rpm may be skipped on some
      #    setups) and only errors if NO artifact was produced for this OS.
      - name: upload installers (windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          $assets = @(
            Get-ChildItem -Path desktop/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue
            Get-ChildItem -Path desktop/target/release/bundle/msi  -Filter *.msi -ErrorAction SilentlyContinue
          ) | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "no Windows installer artifacts found to upload" }
          gh release upload $tag $assets --clobber

      - name: upload installers (linux/macos)
        if: matrix.os != 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          bundle="desktop/target/release/bundle"
          # Glob every per-OS bundle; missing optional formats (e.g. .rpm) are
          # simply skipped. Only error if this OS produced no artifact at all.
          mapfile -t assets < <(find "$bundle" \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' \) \
            -type f 2>/dev/null)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no installer artifacts found under $bundle to upload" >&2
            exit 1
          fi
          printf 'uploading: %s\n' "${assets[@]}"
          gh release upload "$TAG" "${assets[@]}" --clobber
